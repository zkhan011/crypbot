services:
  postgres:
    image: postgres:16
    environment: {POSTGRES_USER: crypbot, POSTGRES_PASSWORD: crypbot, POSTGRES_DB: crypbot}
    healthcheck: {test: ["CMD-SHELL","pg_isready -U crypbot"], interval: 10s, timeout: 5s, retries: 5}
    volumes: [pgdata:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    healthcheck: {test: ["CMD","redis-cli","ping"], interval: 10s, timeout: 5s, retries: 5}
  api:
    build: ./backend
    env_file: .env.example
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    depends_on: {postgres: {condition: service_healthy}, redis: {condition: service_healthy}}
    healthcheck: {test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"], interval: 10s, timeout: 5s, retries: 5}
  worker:
    build: ./backend
    env_file: .env.example
    command: python -c "import time; print('worker ready'); time.sleep(3600)"
    depends_on: [redis, postgres]
  scheduler:
    build: ./backend
    env_file: .env.example
    command: python -c "import time; print('scheduler ready'); time.sleep(3600)"
    depends_on: [redis, postgres]
  frontend:
    build: ./frontend
    ports: ["5173:5173"]
  proxy:
    image: nginx:1.27-alpine
    volumes: [./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro]
    ports: ["8080:80"]
    depends_on: [api, frontend]
  prometheus:
    image: prom/prometheus:latest
    command: --config.file=/etc/prometheus/prometheus.yml
  grafana:
    image: grafana/grafana:latest
volumes: {pgdata: {}}
